name: Atualizar Catálogo EVG e Regenerar Embeddings

on:
  schedule:
    # Toda segunda-feira às 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache de dependências pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Instalar dependências
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Baixar stopwords NLTK
        run: python -c "import nltk; nltk.download('stopwords', quiet=True)"

      - name: Baixar catálogo e gerar embeddings
        run: python scripts/build_embeddings.py

      - name: Commit e push se houver alterações
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ embeddings/
          if git diff --cached --quiet; then
            echo "Nenhuma alteração no catálogo."
          else
            git commit -m "chore: atualiza catálogo EVG e regenera embeddings [auto]"
            git push
          fi
